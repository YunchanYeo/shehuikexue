# Mac에서 push만 하면 클라우드에서 dmg + Windows Setup.exe 를 빌드합니다.
# Actions 탭 → "Build installers" → Run workflow 로 수동 실행도 가능합니다.

name: Build installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller (.app)
        run: pyinstaller speech_eval.spec --noconfirm --clean

      - name: Create DMG
        run: |
          test -d dist/SpeechEval.app
          STAGE=dist/dmg-staging
          rm -rf "$STAGE" dist/SpeechEval.dmg
          mkdir -p "$STAGE"
          cp -R dist/SpeechEval.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "中文口语评估" -srcfolder "$STAGE" -ov -format UDZO dist/SpeechEval.dmg
          rm -rf "$STAGE"
          ls -lh dist/SpeechEval.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: SpeechEval-macOS
          path: dist/SpeechEval.dmg
          retention-days: 30

  build-windows:
    name: Windows (Setup.exe)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller
        run: pyinstaller speech_eval.spec --noconfirm --clean

      - name: Build installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\windows.iss
          if (-not (Test-Path dist\SpeechEval-Setup.exe)) { throw "SpeechEval-Setup.exe not found" }
          Get-Item dist\SpeechEval-Setup.exe | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: SpeechEval-Windows
          path: dist/SpeechEval-Setup.exe
          retention-days: 30

  release:
    name: GitHub Release (tags only)
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: SpeechEval-*
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name 'SpeechEval.dmg' -exec cp -v {} release/ \;
          find artifacts -name 'SpeechEval-Setup.exe' -exec cp -v {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
